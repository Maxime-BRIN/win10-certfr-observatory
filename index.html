<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Observatoire Windows 10 – données NVD</title>

  <style>
    :root {
      --bg: #f5f5f7;
      --bg-panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: rgba(37, 99, 235, 0.08);
      --border-subtle: #e5e7eb;
      --radius: 10px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(8px);
      background: rgba(245, 245, 247, 0.92);
      border-bottom: 1px solid var(--border-subtle);
    }

    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .title-block {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .badge {
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.18rem 0.5rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid rgba(37, 99, 235, 0.2);
      white-space: nowrap;
    }

    .header-links a {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      border: 1px solid transparent;
    }

    .header-links a:hover {
      border-color: var(--border-subtle);
      background: #ffffff;
    }

    main {
      flex: 1;
      max-width: 1120px;
      margin: 0 auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .top-grid {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(0, 3fr);
      gap: 1.25rem;
    }

    @media (max-width: 900px) {
      .top-grid {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .panel {
      background: var(--bg-panel);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }

    .panel-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 0.6rem;
      gap: 0.5rem;
    }

    .panel-title {
      font-size: 0.95rem;
      font-weight: 600;
    }

    .panel-subtitle {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.75rem;
    }

    @media (max-width: 700px) {
      .kpis {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    .kpi {
      padding: 0.75rem 0.8rem;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .kpi-label {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .kpi-value {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--accent);
    }

    .kpi-meta {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .chart-container {
      position: relative;
      height: 220px;
    }

    .alert {
      margin-top: 0.4rem;
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      background: #fef9c3;
      border: 1px solid #facc15;
      font-size: 0.8rem;
      color: #854d0e;
    }

    .alert span {
      font-weight: 600;
    }

    .table-panel {
      margin-bottom: 1rem;
    }
