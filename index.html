  <body>
    <!-- contenu HTML inchangé, seul le JS de chargement de données est adapté en bas de fichier -->

    <script>
      const PRIMARY_DATA_URL = "./data/windows-10-certfr-data.json";
      const FALLBACK_DATA_URL = "./data/windows-10-certfr-sample-data.json";
      const EOS_DATE = new Date("2025-10-14T00:00:00Z");

      async function loadDataset() {
        try {
          const res = await fetch(PRIMARY_DATA_URL, { cache: "no-store" });
          if (!res.ok) {
            throw new Error("dataset prod indisponible");
          }
          return await res.json();
        } catch (err) {
          console.warn("[INFO] Fallback sur le jeu de données d'exemple:", err);
          const res = await fetch(FALLBACK_DATA_URL, { cache: "no-store" });
          if (!res.ok) {
            throw new Error("Impossible de charger le dataset d'exemple");
          }
          return await res.json();
        }
      }

      /* reste du JS V1 (computeKpis, groupByMonth, renderChart, renderTable, etc.) inchangé */
    </script>
  </body>
