name: Fetch CERT-FR Windows 10 data

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-certfr-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build CERT-FR CVE index
        run: |
          python tools/build_certfr_cve_index.py

      - name: Enrich CVE with NVD and build observatory
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          python tools/enrich_cve_with_nvd.py

      - name: Commit and push updated dataset
        if: github.event_name == 'workflow_dispatch' && env.ALLOW_DATASET_COMMIT == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALLOW_DATASET_COMMIT: ${{ vars.ALLOW_DATASET_COMMIT }}
        run: |
          if [[ -n "$(git status --porcelain data/certfr_cve_index.json data/certfr_windows10_cve.json data/certfr_windows10_observatory.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/certfr_cve_index.json data/certfr_windows10_cve.json data/certfr_windows10_observatory.json
            git commit -m "chore: update CERT-FR Windows 10 observatory dataset"
            git push
          else
            echo "No changes in datasets, nothing to commit."
