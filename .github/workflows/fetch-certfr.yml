name: Fetch CERT-FR Windows 10 data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"  # Lundi 03:00 UTC (usage raisonnable)

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Fetch CERT-FR Windows 10 data
        run: |
          python tools/fetch_certfr_win10.py

      - name: Commit updated dataset
        run: |
          if git status --porcelain | grep "data/windows-10-certfr-data.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/windows-10-certfr-data.json
            git commit -m "chore: update CERT-FR Windows 10 dataset" || echo "Rien à committer"
            git push
          fi
