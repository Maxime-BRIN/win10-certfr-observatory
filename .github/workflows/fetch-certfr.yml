name: Fetch CERT-FR Windows 10 data

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-certfr-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CERT-FR Windows 10 fetch script
        run: |
          python tools/fetch_certfr_win10.py

      - name: Commit and push updated dataset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "$(git status --porcelain data/windows-10-certfr-data.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/windows-10-certfr-data.json
            git commit -m "chore: update Windows 10 CERT-FR dataset"
            git push
          else
            echo "No changes in dataset, nothing to commit."
          fi
