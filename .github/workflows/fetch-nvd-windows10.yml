name: Fetch Windows 10 CVE from CVE.org

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  fetch-cveorg-windows10-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Windows 10 CVE from CVE.org
        run: |
          python tools/fetch_cve_windows10.py

      - name: Build frontend dataset
        run: |
          python tools/build_windows10_frontend_data.py

      - name: Upload datasets as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cve-windows10-json
          path: |
            data/cve_windows10.json
            data/windows-10-cve-data.json

      - name: Commit and push updated dataset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          if [[ -n "$(git status --porcelain data/cve_windows10.json data/windows-10-cve-data.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git add data/cve_windows10.json data/windows-10-cve-data.json
            git commit -m "chore: update CVE.org Windows 10 datasets" || echo "Nothing to commit"
            git push origin main
          else
            echo "No changes in datasets, nothing to commit."
          fi
