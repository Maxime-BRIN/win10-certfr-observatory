name: Fetch Windows 10 CVE from NVD

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  fetch-nvd-windows10-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch Windows 10 CVE from NVD
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          python tools/fetch_cve_windows10.py

      - name: Upload data/cve_windows10.json as artifact
        uses: actions/upload-artifact@v4
        with:
          name: cve-windows10-json
          path: data/cve_windows10.json

      - name: Commit and push updated dataset
        if: github.event_name == 'workflow_dispatch' && env.ALLOW_DATASET_COMMIT == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALLOW_DATASET_COMMIT: ${{ vars.ALLOW_DATASET_COMMIT }}
        run: |
          if [[ -n "$(git status --porcelain data/cve_windows10.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/cve_windows10.json
            git commit -m "chore: update NVD Windows 10 CVE dataset"
            git push
          else
            echo "No changes in dataset, nothing to commit."
